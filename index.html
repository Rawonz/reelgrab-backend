<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReelGrab — Video İndirici</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ig: #D4537E;
    --tt: #534AB7;
    --yt: #E24B4A;
    --bg: #09090f;
    --surface: #111118;
    --card: #17171f;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.42);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 520px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -1px;
  }

  .logo span { color: var(--ig); }

  .sub {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 12px;
  }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tab {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab.active { color: #fff; }
  .tab.active.ig { background: rgba(212,83,126,0.18); border-color: rgba(212,83,126,0.5); }
  .tab.active.tt { background: rgba(83,74,183,0.18); border-color: rgba(83,74,183,0.5); }
  .tab.active.yt { background: rgba(226,75,74,0.18); border-color: rgba(226,75,74,0.5); }

  .tab svg { width: 16px; height: 16px; fill: currentColor; }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: rgba(83,74,183,0.6); }
  input[type="text"]::placeholder { color: rgba(240,240,248,0.2); }

  .btn-main {
    padding: 11px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    color: #fff;
    white-space: nowrap;
    transition: opacity 0.18s, transform 0.1s;
    background: var(--ig);
  }

  .btn-main:hover { opacity: 0.85; }
  .btn-main:active { transform: scale(0.97); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

  .qgrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .qpill {
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .qpill small { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .qpill.on { border-color: rgba(83,74,183,0.6); background: rgba(83,74,183,0.15); color: #AFA9EC; }
  .qpill.on small { color: rgba(175,169,236,0.7); }
  .qpill:hover:not(.on) { background: rgba(255,255,255,0.05); color: var(--text); }

  .opts {
    display: flex;
    gap: 6px;
  }

  .opt {
    flex: 1;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.15s;
  }

  .opt.on { background: rgba(30,160,120,0.12); border-color: rgba(30,160,120,0.4); color: #5DCAA5; }

  .progress {
    margin-top: 16px;
    display: none;
  }

  .progress.vis { display: block; }

  .prog-track {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .prog-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--tt);
    width: 0%;
    transition: width 0.3s ease;
  }

  .prog-txt {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  .preview {
    margin-top: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: none;
    gap: 14px;
    align-items: center;
  }

  .preview.vis { display: flex; }

  .thumb {
    width: 68px;
    height: 68px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .thumb-placeholder {
    width: 68px;
    height: 68px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .pinfo { flex: 1; min-width: 0; }

  .ptitle {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pmeta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .btn-dl {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    color: #fff;
    background: var(--tt);
    transition: opacity 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-dl:hover { opacity: 0.85; }
  .btn-dl:disabled { opacity: 0.4; cursor: not-allowed; }

  .error {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(226,75,74,0.1);
    border: 1px solid rgba(226,75,74,0.25);
    border-radius: 8px;
    font-size: 12px;
    color: #F09595;
    display: none;
  }

  .error.vis { display: block; }

  .hist-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .hist-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .hist-empty {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 12px 0;
  }

  .hlist { display: flex; flex-direction: column; gap: 6px; }

  .hitem {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
  }

  .hbadge {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .hbadge.ig { background: rgba(212,83,126,0.18); }
  .hbadge.tt { background: rgba(83,74,183,0.18); }
  .hbadge.yt { background: rgba(226,75,74,0.18); }

  .hname { flex: 1; font-size: 12px; font-weight: 500; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hmeta { font-size: 10px; color: var(--muted); white-space: nowrap; }

  .badge-ok {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(30,160,120,0.18);
    color: #5DCAA5;
    font-weight: 500;
    white-space: nowrap;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">reel<span>grab</span></div>
  <div class="sub">Instagram · TikTok · YouTube — filigransız, yüksek kalite</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active ig" id="tab-ig" onclick="setTab('ig')">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        Instagram
      </button>
      <button class="tab tt" id="tab-tt" onclick="setTab('tt')">
        <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.73a8.19 8.19 0 004.79 1.54V6.79a4.85 4.85 0 01-1.02-.1z"/></svg>
        TikTok
      </button>
      <button class="tab yt" id="tab-yt" onclick="setTab('yt')">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        YouTube
      </button>
    </div>

    <div class="field-label">Video URL'si</div>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://www.instagram.com/reel/..." />
      <button class="btn-main" id="btnAnaliz" onclick="analiz()">Analiz Et →</button>
    </div>

    <div class="field-label">Kalite</div>
    <div class="qgrid">
      <button class="qpill" onclick="setQ(this,'2160')">4K<small>2160p</small></button>
      <button class="qpill on" onclick="setQ(this,'1080')">FHD<small>1080p</small></button>
      <button class="qpill" onclick="setQ(this,'720')">HD<small>720p</small></button>
      <button class="qpill" onclick="setQ(this,'480')">SD<small>480p</small></button>
    </div>

    <div class="opts">
      <button class="opt on" id="opt-wm" onclick="toggle(this)">✓ Filigransız</button>
      <button class="opt on" id="opt-ses" onclick="toggle(this)">✓ Ses dahil</button>
      <button class="opt" id="opt-mp3" onclick="toggle(this)">♪ Sadece MP3</button>
    </div>

    <div class="progress" id="prog">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-txt" id="progTxt">Analiz ediliyor...</div>
    </div>

    <div class="error" id="errBox"></div>

    <div class="preview" id="preview">
      <div class="thumb-placeholder" id="thumbWrap">🎬</div>
      <div class="pinfo">
        <div class="ptitle" id="pTitle">—</div>
        <div class="pmeta">
          <span id="pQ">1080p</span>
          <span id="pDur">—</span>
        </div>
        <button class="btn-dl" id="btnDl" onclick="indir()">⬇ İndir</button>
      </div>
    </div>
  </div>

  <div class="hist-card">
    <div class="hist-label">Son indirilenler</div>
    <div id="histEmpty" class="hist-empty">Henüz indirme yok</div>
    <div class="hlist" id="histList"></div>
  </div>

  <footer>ReelGrab · Kişisel kullanım içindir</footer>
</div>

<script>
  // ⬇ BURAYA BACKEND URL'İNİ YAZ (Railway/Render'dan aldıktan sonra)
  const API = "https://reelgrab-backend-production.up.railway.app/";

  let tab = "ig";
  let kalite = "1080";
  let videoInfo = null;

  const tabEmojis = { ig: "📸", tt: "🎵", yt: "▶" };
  const tabColors = { ig: "#D4537E", tt: "#534AB7", yt: "#E24B4A" };
  const placeholders = {
    ig: "https://www.instagram.com/reel/...",
    tt: "https://www.tiktok.com/@kullanici/video/...",
    yt: "https://www.youtube.com/watch?v=..."
  };

  function setTab(t) {
    tab = t;
    ["ig","tt","yt"].forEach(x => {
      const el = document.getElementById("tab-"+x);
      el.classList.remove("active");
    });
    document.getElementById("tab-"+t).classList.add("active");
    document.getElementById("urlInput").placeholder = placeholders[t];
    document.getElementById("btnAnaliz").style.background = tabColors[t];
    document.getElementById("btnDl").style.background = tabColors[t];
    hidePreview();
  }

  function setQ(el, q) {
    kalite = q;
    document.querySelectorAll(".qpill").forEach(p => p.classList.remove("on"));
    el.classList.add("on");
    if (videoInfo) document.getElementById("pQ").textContent = q + "p";
  }

  function toggle(el) {
    el.classList.toggle("on");
    if (el.id === "opt-mp3" && el.classList.contains("on")) {
      document.querySelectorAll(".qpill").forEach(p => p.style.opacity = "0.3");
    } else if (el.id === "opt-mp3") {
      document.querySelectorAll(".qpill").forEach(p => p.style.opacity = "1");
    }
  }

  function showErr(msg) {
    const b = document.getElementById("errBox");
    b.textContent = "⚠ " + msg;
    b.classList.add("vis");
    setTimeout(() => b.classList.remove("vis"), 5000);
  }

  function hidePreview() {
    document.getElementById("preview").classList.remove("vis");
    videoInfo = null;
  }

  function setProgress(pct, txt) {
    document.getElementById("prog").classList.add("vis");
    document.getElementById("progFill").style.width = pct + "%";
    document.getElementById("progTxt").textContent = txt;
  }

  function hideProgress() {
    document.getElementById("prog").classList.remove("vis");
    document.getElementById("progFill").style.width = "0%";
  }

  async function analiz() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) { showErr("Lütfen bir URL gir"); return; }

    document.getElementById("btnAnaliz").disabled = true;
    document.getElementById("errBox").classList.remove("vis");
    hidePreview();

    setProgress(30, "URL analiz ediliyor...");
    setTimeout(() => setProgress(60, "Video bilgileri çekiliyor..."), 600);

    try {
      const res = await fetch(API + "/analiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (data.hata) { showErr(data.hata); hideProgress(); return; }

      setProgress(100, "Hazır!");
      videoInfo = data;

      setTimeout(() => {
        hideProgress();
        document.getElementById("pTitle").textContent = data.baslik;
        document.getElementById("pQ").textContent = kalite + "p";
        document.getElementById("pDur").textContent = data.sure || "—";

        const tw = document.getElementById("thumbWrap");
        if (data.thumbnail) {
          tw.innerHTML = `<img class="thumb" src="${data.thumbnail}" alt="kapak" onerror="this.parentNode.textContent='${tabEmojis[tab]}'" />`;
        } else {
          tw.textContent = tabEmojis[tab];
        }

        document.getElementById("preview").classList.add("vis");
      }, 400);

    } catch (e) {
      showErr("Sunucuya bağlanılamadı. Backend'in çalıştığına emin ol.");
      hideProgress();
    } finally {
      document.getElementById("btnAnaliz").disabled = false;
    }
  }

  async function indir() {
    if (!videoInfo) return;
    const url = document.getElementById("urlInput").value.trim();
    const mp3 = document.getElementById("opt-mp3").classList.contains("on");

    const btn = document.getElementById("btnDl");
    btn.disabled = true;
    btn.textContent = "⏳ İndiriliyor...";

    try {
      const res = await fetch(API + "/indir", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, kalite, mp3 })
      });

      if (!res.ok) {
        const err = await res.json();
        showErr(err.hata || "Bir hata oluştu");
        return;
      }

      const blob = await res.blob();
      const a = document.createElement("a");
      const ext = mp3 ? "mp3" : "mp4";
      a.href = URL.createObjectURL(blob);
      a.download = (videoInfo.baslik || "video").replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ\s]/g,"") + "." + ext;
      a.click();
      URL.revokeObjectURL(a.href);

      btn.textContent = "✓ İndirildi!";
      btn.style.background = "#1D9E75";
      addHist(videoInfo.baslik, kalite, mp3);

      setTimeout(() => {
        btn.textContent = "⬇ İndir";
        btn.style.background = tabColors[tab];
        btn.disabled = false;
      }, 3000);

    } catch (e) {
      showErr("İndirme başarısız: " + e.message);
      btn.textContent = "⬇ İndir";
      btn.disabled = false;
    }
  }

  function addHist(baslik, q, mp3) {
    document.getElementById("histEmpty").style.display = "none";
    const list = document.getElementById("histList");
    const item = document.createElement("div");
    item.className = "hitem";
    item.innerHTML = `
      <div class="hbadge ${tab}">${tabEmojis[tab]}</div>
      <div style="flex:1;min-width:0">
        <div class="hname">${baslik}</div>
        <div class="hmeta">${mp3?"MP3":q+"p"} · şimdi</div>
      </div>
      <span class="badge-ok">✓ Tamam</span>
    `;
    list.insertBefore(item, list.firstChild);
    if (list.children.length > 8) list.removeChild(list.lastChild);
  }

  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") analiz();
  });
</script>
</body>
</html>
